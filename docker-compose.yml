# Entorno de DESARROLLO local.
# Levanta la app (Next.js + Payload) con recarga en caliente y PostgreSQL.
# Uso: docker compose up
services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - DATABASE_URL=postgres://tunja:tunja@db:5432/tunja
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-dev-secret-cambia-esto-en-produccion}
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=tunja
      - POSTGRES_PASSWORD=tunja
      - POSTGRES_DB=tunja
    ports:
      # 5434 en el host para no chocar con otros PostgreSQL locales (5432/5433).
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tunja -d tunja']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  pgdata:
