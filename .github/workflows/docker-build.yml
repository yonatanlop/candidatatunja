name: Construir, publicar y desplegar

# En cada push a main: 1) construye la imagen y la publica en GHCR,
# 2) entra por SSH a la VM de Oracle y actualiza el despliegue.
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadatos (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Construir y publicar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en la VM de Oracle (SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/candidatatunja && cd ~/candidatatunja
            curl -fsSL -o docker-compose.oracle.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.oracle.yml
            {
              echo "PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}"
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
              echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}"
              echo "PAYLOAD_DB_PUSH=${{ secrets.PAYLOAD_DB_PUSH }}"
            } > .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.oracle.yml pull
            docker compose -f docker-compose.oracle.yml up -d
            docker logout ghcr.io
            docker image prune -f
