# Despliegue en la VM de Oracle Cloud usando la imagen publicada en GHCR.
# No compila nada en el servidor: solo descarga la imagen y la ejecuta.
#
# Uso en la VM:
#   1) Crear un archivo .env con PAYLOAD_SECRET, DB_PASSWORD y NEXT_PUBLIC_SITE_URL.
#   2) docker login ghcr.io   (con un Personal Access Token con read:packages)
#   3) docker compose -f docker-compose.oracle.yml pull
#   4) docker compose -f docker-compose.oracle.yml up -d
services:
  app:
    image: ghcr.io/yonatanlop/candidatatunja:latest
    restart: unless-stopped
    ports:
      - '80:3000'
    environment:
      - DATABASE_URL=postgres://tunja:${DB_PASSWORD:?define DB_PASSWORD}@db:5432/tunja
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:?define PAYLOAD_SECRET}
      - PAYLOAD_DB_PUSH=${PAYLOAD_DB_PUSH:-false}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:?define NEXT_PUBLIC_SITE_URL}
      - NODE_ENV=production
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=tunja
      - POSTGRES_PASSWORD=${DB_PASSWORD:?define DB_PASSWORD}
      - POSTGRES_DB=tunja
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tunja -d tunja']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  media:
  pgdata:
